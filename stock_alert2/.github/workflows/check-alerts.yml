name: NEPSE Alert Checker

on:
  schedule:
    # Runs every 30 minutes Monday to Friday
    # Nepal time is UTC+5:45 so market hours 11AM-3PM NST = 5:15AM-9:15AM UTC
    - cron: '*/30 5-9 * * 1-5'
  workflow_dispatch:  # Also allows manual trigger from GitHub

jobs:
  check-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install django
          pip install nepse_scraper
          pip install pytz

      - name: Run alert checker
        env:
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          DJANGO_SETTINGS_MODULE: stock_alert2.settings
        run: |
          python manage.py check_alerts