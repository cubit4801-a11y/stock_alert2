<!DOCTYPE html>
<html>
<head>
    <title>Stock Alert - Login</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'accounts/style.css' %}">
</head>
<body>
  <div class="container">

    <div class="logo">
      <h1>📈 NEPSE Alert</h1>
      <p>Nepal Stock Exchange · Price Alerts</p>
    </div>

    <h2>Welcome to NEPSE Alert</h2>

    {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>

    <div class="link">
      <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>

  </div>
</body>
</html>
